<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고장 분석</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand fw-bold">아진산업 OEE 모니터링</span>
        <div>
            <a href="#" class="btn btn-outline-light me-2">메인</a>
            <a href="#" class="btn btn-outline-light me-2">고장 분석</a>
            <a href="#" class="btn btn-outline-light me-2">유지보수</a>
            <a href="#" class="btn btn-outline-light">교대별 OEE</a>
        </div>
    </nav>

    <div class="container mt-4">

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card bg-white p-3">
                    <h5>고장 원인 파레토</h5>
                    <canvas id="paretoChart"></canvas>
                </div>
            </div>
        </div>

        <h4 class="mb-3">고장 이력</h4>
        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th><button class="btn btn-sm btn-dark p-0 px-1">날짜 ↓</button></th>
                    <th>설비명</th>
                    <th>고장 원인</th>
                    <th>정지 시간(분)</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>2026-05-31</td><td>M1</td><td>기계 고장</td><td>32</td></tr>
                <tr><td>2026-05-30</td><td>M2</td><td>전기 고장</td><td>18</td></tr>
                <tr><td>2026-05-29</td><td>M1</td><td>교체 작업</td><td>25</td></tr>
                <tr><td>2026-05-28</td><td>M2</td><td>라인 막힘</td><td>12</td></tr>
                <tr><td>2026-05-27</td><td>M1</td><td>자재 부족</td><td>40</td></tr>
                <tr><td>2026-05-26</td><td>M2</td><td>품질 불량</td><td>15</td></tr>
                <tr><td>2026-05-25</td><td>M1</td><td>기계 고장</td><td>28</td></tr>
                <tr><td>2026-05-24</td><td>M2</td><td>교체 작업</td><td>22</td></tr>
            </tbody>
        </table>

    </div>

    <script>
        new Chart(document.getElementById('paretoChart').getContext('2d'), {
            type: 'bar',
            data: {
                labels: ['기계 고장', '교체 작업', '자재 부족', '전기 고장', '라인 막힘', '품질 불량'],
                datasets: [{ label: '총 정지시간 (분)', data: [412, 378, 295, 241, 198, 156], backgroundColor: 'rgba(255,99,132,0.7)' }]
            }
        });
    </script>
</body>
</html>
